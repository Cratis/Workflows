name: Propagate Copilot Instructions
# Reusable workflow that propagates Copilot instruction changes from the calling
# repository to all other repositories in the Cratis organization.
# This workflow requires PAT_WORKFLOWS secret with permissions:
#   Classic PAT:       repo + workflow scopes
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#                      + Workflows (read/write)
#
# NOTE: This workflow uses the GitHub Git Data API (blobs/trees/commits/refs)
# and GraphQL mutations to create branches and PRs directly — the same approach
# used by the Bootstrap workflow.  No per-repository workflow dispatch is needed.
#
# Repositories are processed in parallel using a dynamic matrix built from the
# list of non-archived Cratis repositories (excluding the source repo and a small
# ignore list).  Each matrix job handles exactly one target repository.

on:
  workflow_call:
    inputs:
      event_name:
        description: 'The event that triggered the caller workflow (e.g. push, workflow_dispatch)'
        required: false
        type: string
        default: 'push'
    secrets:
      PAT_WORKFLOWS:
        required: true

permissions:
  contents: read

jobs:
  get-repos:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'Cratis' }}
    outputs:
      repos: ${{ steps.list-repos.outputs.repos }}

    steps:
      - name: Get all Cratis repositories
        id: list-repos
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          SOURCE_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ inputs.event_name }}
        run: |
          source_name="${SOURCE_REPO##*/}"

          # Skip propagation when the triggering commit is itself a Copilot sync
          # commit (squash or rebase merge of a sync PR).  This prevents a repo
          # from immediately re-propagating content it just received.
          #
          # This guard is bypassed for manual triggers (workflow_dispatch) so that
          # a user can always force a propagation regardless of the last commit message.
          #
          # We match only the exact commit message written by the sync scripts
          # ("Sync Copilot instructions from …").  We intentionally do NOT match
          # on the branch name "copilot-sync/update-instructions" because that
          # pattern also matches regular merge commits ("Merge pull request #N
          # from …/copilot-sync/update-instructions"), which would incorrectly
          # suppress propagation in repos that regularly receive — and merge —
          # sync PRs from other canonical sources.  For regular merges the
          # propagation proceeds; the per-repo "up to date" content check in the
          # propagation script naturally prevents creating redundant PRs.
          if [ "${EVENT_NAME:-push}" != "workflow_dispatch" ]; then
            commit_msg=$(gh api "repos/${SOURCE_REPO}/git/commits/${HEAD_SHA}" \
              --jq '.message' 2>/dev/null || true)
            if echo "$commit_msg" | grep -qiE '^Sync Copilot instructions from'; then
              echo "ℹ Skipping propagation: the triggering commit is a Copilot sync commit — no further propagation needed."
              echo "repos=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # List all non-archived repos, excluding the source repo and a fixed
          # ignore list.  The result is a compact JSON array used as the matrix.
          repos=$(gh repo list Cratis --limit 1000 --json name,isArchived \
            | jq -c --arg src "$source_name" \
            '[.[] | select(.isArchived == false) | .name
              | select(. != $src)
              | select(. != "cratis.github.io")
              | select(. != "Workflows")]')
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  propagate:
    needs: get-repos
    if: ${{ needs.get-repos.outputs.repos != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.get-repos.outputs.repos) }}
      fail-fast: false

    steps:
      - name: Checkout Workflows repository
        uses: actions/checkout@v4
        with:
          repository: Cratis/Workflows
          ref: main
          token: ${{ secrets.PAT_WORKFLOWS }}

      - name: Propagate Copilot instructions to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          SOURCE_REPO: ${{ github.repository }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          bash .github/scripts/propagate-copilot-instructions.sh
