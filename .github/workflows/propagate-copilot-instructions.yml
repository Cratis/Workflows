name: Propagate Copilot Instructions
# Reusable workflow that propagates Copilot instruction changes from the calling
# repository to all other repositories in the Cratis organization.
# This workflow requires PAT_WORKFLOWS secret with permissions:
#   Classic PAT:       repo + workflow scopes
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#                      + Workflows (read/write)
#
# NOTE: This workflow uses the GitHub Git Data API (blobs/trees/commits/refs)
# and GraphQL mutations to create branches and PRs directly — the same approach
# used by the Bootstrap workflow.  No per-repository workflow dispatch is needed.
#
# Repositories are processed in parallel using a dynamic matrix built from the
# list of non-archived Cratis repositories (excluding the source repo and a small
# ignore list).  Each matrix job handles exactly one target repository.

on:
  workflow_call:
    secrets:
      PAT_WORKFLOWS:
        required: true

permissions:
  contents: read

jobs:
  get-repos:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'Cratis' }}
    outputs:
      repos: ${{ steps.list-repos.outputs.repos }}

    steps:
      - name: Get all Cratis repositories
        id: list-repos
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          source_name="${SOURCE_REPO##*/}"
          # List all non-archived repos, excluding the source repo and a fixed
          # ignore list.  The result is a compact JSON array used as the matrix.
          repos=$(gh repo list Cratis --limit 1000 --json name,isArchived \
            | jq --arg src "$source_name" \
            '[.[] | select(.isArchived == false) | .name
              | select(. != $src)
              | select(. != "cratis.github.io")
              | select(. != "Workflows")]')
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  propagate:
    needs: get-repos
    if: ${{ needs.get-repos.outputs.repos != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.get-repos.outputs.repos) }}
      fail-fast: false

    steps:
      - name: Checkout Workflows repository
        uses: actions/checkout@v4
        with:
          repository: Cratis/Workflows
          ref: main
          token: ${{ secrets.PAT_WORKFLOWS }}

      - name: Propagate Copilot instructions to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          SOURCE_REPO: ${{ github.repository }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          bash .github/scripts/propagate-copilot-instructions.sh
