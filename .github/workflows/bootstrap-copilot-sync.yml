name: Bootstrap Copilot Sync
# Ensures all Cratis repositories have the Copilot sync wrapper workflows
# installed and up-to-date, and that the initial Copilot setup from Cratis/AI
# is in place.  Handles both initial bootstrap (new repos) and ongoing updates
# (when the wrapper workflow content or Copilot files change):
#
#  • New repos:               adds the two wrapper workflows and copies the
#                             initial Copilot setup from Cratis/AI.
#  • Already-bootstrapped:    updates wrapper workflows and Copilot files if
#                             the content has changed since last run.
#  • Already up-to-date:      skips processing.
#
# Triggered automatically on push to main whenever this script changes
# (e.g. updated wrapper content or a new Copilot folder path).  Can also
# be run manually at any time via workflow_dispatch.
#
# Requires PAT_WORKFLOWS secret with permissions:
#   Classic PAT:       repo + workflow scopes
#   Fine-grained PAT:  Contents (read/write) + Workflows (read/write)
#
# NOTE: This workflow uses the GitHub Git Data API (blobs/trees/commits/refs)
# instead of git push.  GitHub still enforces workflow-file protection
# on POST /git/trees when the tree contains .github/workflows/ paths, so the
# PAT must include the Workflows permission.
#
# The PAT owner must also be configured as a bypass actor on each target
# repository's branch protection ruleset so that direct pushes to the
# default branch are permitted.
#
# Re-running this workflow is safe: it skips repos where content is already
# up-to-date and pushes directly to the default branch for repos that need
# changes.

on:
  push:
    branches: ["main"]
    paths:
      - ".github/scripts/bootstrap-copilot-sync.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PAT can authenticate
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          auth_error=$(mktemp)
          if ! gh api /user >/dev/null 2>"$auth_error"; then
            echo "::error::Could not authenticate with PAT_WORKFLOWS. Is the secret set correctly?"
            echo "::error::API error: $(cat "$auth_error")"
            rm -f "$auth_error"
            exit 1
          fi
          rm -f "$auth_error"
          login=$(gh api /user --jq '.login')
          echo "✓ Authenticated as $login"
          # Show which credential gh is actually using — confirms PAT is active
          # and not accidentally overridden by GITHUB_TOKEN.
          echo "  gh auth status:"
          gh auth status 2>&1 | sed 's/^/    /'
          # Show PAT type and scopes to help diagnose permission issues.
          # Classic PATs expose granted scopes via the X-OAuth-Scopes response header.
          # Fine-grained PATs do not include this header.
          oauth_scopes=$(gh api /user -i 2>/dev/null | grep -i '^x-oauth-scopes:' | sed 's/[^:]*: //' | tr -d '\r' || true)
          if [ -n "$oauth_scopes" ]; then
            echo "  PAT type: classic"
            echo "  OAuth scopes: $oauth_scopes"
          else
            echo "  PAT type: fine-grained (scopes not exposed via API)"
          fi

      - name: Get all Cratis repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          # List all non-archived repos (limit 1000 covers foreseeable growth)
          # Write to a workspace file to avoid the 21000-character expression
          # length limit that applies when passing large values via step outputs.
          gh repo list Cratis --limit 1000 --json name,isArchived \
            --jq '[.[] | select(.isArchived == false) | .name]' \
            > "$GITHUB_WORKSPACE/repos.json"

      - name: Bootstrap Copilot sync in all repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          REPOS_FILE: ${{ github.workspace }}/repos.json
        run: |
          bash .github/scripts/bootstrap-copilot-sync.sh
