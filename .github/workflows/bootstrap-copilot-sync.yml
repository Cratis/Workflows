name: Bootstrap Copilot Sync
# Bootstrap workflow that creates PRs in all Cratis repositories to:
# 1. Delete any existing Copilot instruction files (clean slate)
# 2. Add thin wrapper workflows that delegate to the reusable workflows in this repository.
# Trigger this workflow manually to set up (or re-set up) all repositories.
# Requires PAT_DOCUMENTATION secret with permissions:
# - repo     (to clone, push branches, and open pull requests)
# - workflow (to create or update .github/workflows files via git push)
#
# NOTE: Both scopes are required. GitHub enforces that git pushes containing
# workflow files are rejected unless the PAT has the "workflow" scope, even when
# "repo" scope is present.
#
# Re-running this workflow is safe: it force-pushes the branch to a clean state
# and skips repos where a PR already exists.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Verify PAT has required scopes
        env:
          GH_TOKEN: ${{ secrets.PAT_DOCUMENTATION }}
        run: |
          # The PAT must have both "repo" and "workflow" scopes (classic PAT).
          # GitHub rejects git pushes that add or update .github/workflows/ files
          # when the PAT lacks the "workflow" scope, causing every push to fail
          # silently and no PRs to be created.
          #
          # Classic PATs expose their scopes in the X-OAuth-Scopes response header.
          # Fine-grained PATs do not; for them we skip the scope check and rely on
          # the PAT having the "Workflows (write)" repository permission.
          scopes=$(gh api /user -i 2>&1 | grep -i '^x-oauth-scopes:' | sed 's/x-oauth-scopes: //i' || true)
          if [ -z "$scopes" ]; then
            # Fine-grained PAT or failed auth — verify the token authenticates at all
            if ! gh api /user >/dev/null 2>&1; then
              echo "::error::Could not authenticate with PAT_DOCUMENTATION. Is the secret set correctly?"
              exit 1
            fi
            echo "ℹ Fine-grained PAT detected (no X-OAuth-Scopes header)."
            echo "ℹ Ensure the PAT has the 'Workflows' (write) repository permission; otherwise pushes will fail."
          else
            echo "Token scopes: $scopes"
            if ! echo "$scopes" | grep -qw "workflow"; then
              echo "::error::PAT_DOCUMENTATION is missing the 'workflow' scope."
              echo "::error::Without 'workflow' scope, GitHub rejects every git push that"
              echo "::error::creates or updates .github/workflows files, so no PRs will be created."
              echo "::error::Please regenerate (or update) the PAT and add the 'workflow' scope."
              exit 1
            fi
            echo "✓ PAT has 'workflow' scope"
          fi

      - name: Get all Cratis repositories
        id: get-repos
        env:
          GH_TOKEN: ${{ secrets.PAT_DOCUMENTATION }}
        run: |
          # List all non-archived repos (limit 1000 covers foreseeable growth)
          repos=$(gh repo list Cratis --limit 1000 --json name,isArchived \
            --jq '[.[] | select(.isArchived == false) | .name]')
          echo "repos=$repos" >> $GITHUB_OUTPUT

      - name: Create PRs in all repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_DOCUMENTATION }}
        run: |
          repos='${{ steps.get-repos.outputs.repos }}'
          prs_created_file=$(mktemp)
          push_failures_file=$(mktemp)

          # Pre-computed base64 content for wrapper workflows.
          # Using base64 avoids heredoc end-markers at column 0,
          # which would terminate the YAML block scalar prematurely.
          #
          # sync_b64 decodes to:
          #   name: Sync Copilot Instructions
          #   on:
          #     workflow_dispatch:
          #       inputs:
          #         source_repository:
          #           description: 'Source repository (owner/repo format)'
          #           required: true
          #           type: string
          #   jobs:
          #     sync:
          #       uses: Cratis/Workflows/.github/workflows/sync-copilot-instructions.yml@main
          #       with:
          #         source_repository: ${{ inputs.source_repository }}
          #       secrets: inherit
          sync_b64=""
          #
          # propagate_b64 decodes to:
          #   name: Propagate Copilot Instructions
          #   on:
          #     push:
          #       branches: ["main"]
          #       paths:
          #         - ".github/copilot-instructions.md"
          #         - ".github/instructions/**"
          #         - ".github/agents/**"
          #         - ".github/skills/**"
          #         - ".github/prompts/**"
          #   jobs:
          #     propagate:
          #       uses: Cratis/Workflows/.github/workflows/propagate-copilot-instructions.yml@main
          #       secrets: inherit
          propagate_b64=""

          pr_body=$'Bootstraps centralized Copilot instruction management for this repository.\n\n### Changes\n\n**Removed** (if present):\n- `.github/copilot-instructions.md`\n- `.github/instructions/` folder\n- `.github/agents/` folder\n- `.github/skills/` folder\n- `.github/prompts/` folder\n\n**Added**:\n- `.github/workflows/sync-copilot-instructions.yml` \u2014 triggered via `workflow_dispatch` to pull Copilot instructions from a source repository and open a PR with the changes.\n- `.github/workflows/propagate-copilot-instructions.yml` \u2014 triggered on push to `main` when Copilot instruction files change, propagating updates to all Cratis repositories.\n\nThe actual logic lives in [Cratis/Workflows](https://github.com/Cratis/Workflows) so it can be maintained in one place. Copilot instructions will be managed centrally and synced to this repository via the workflows above.'

          branch="add-copilot-sync-workflows"
          workdir=$(mktemp -d)

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Configure git to use the PAT for all github.com HTTPS operations.
          # This keeps the token out of URLs (and therefore out of log output).
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "${GH_TOKEN}" \
            > ~/.git-credentials

          echo "$repos" | jq -r '.[]' | while read -r repo; do
            # Skip this repository (Workflows) — it holds the reusable workflows
            if [ "$repo" = "Workflows" ]; then
              echo "Skipping Workflows (this repository)"
              continue
            fi

            echo "Processing Cratis/$repo..."

            # Get default branch
            default_branch=$(gh api repos/Cratis/$repo --jq '.default_branch' 2>/dev/null || true)
            if [ -z "$default_branch" ]; then
              echo "  ⚠ Could not get default branch for $repo, skipping"
              continue
            fi

            repo_dir="$workdir/$repo"

            # Clone the repository (shallow, default branch only).
            # Credentials come from the git credential store configured above,
            # so the PAT does not appear in log output.
            if ! git clone --quiet --depth=1 -b "$default_branch" \
              "https://github.com/Cratis/${repo}.git" \
              "$repo_dir"; then
              echo "  ⚠ Could not clone $repo, skipping"
              continue
            fi

            # Create a fresh local branch from the default branch HEAD.
            # When we force-push this below it will reset any existing remote
            # branch to a clean single-commit state, cleaning up any orphaned
            # per-file delete commits left by a previous broken bootstrap run.
            git -C "$repo_dir" checkout -b "$branch"

            # ------------------------------------------------------------------
            # Remove existing Copilot instruction files / folders (if present).
            # All removals go into one commit together with the workflow files.
            # ------------------------------------------------------------------
            git -C "$repo_dir" rm -f ".github/copilot-instructions.md" 2>/dev/null || true
            for d in instructions agents skills prompts; do
              git -C "$repo_dir" rm -rf ".github/$d" 2>/dev/null || true
            done

            # ------------------------------------------------------------------
            # Add the two thin wrapper workflow files.
            # ------------------------------------------------------------------
            mkdir -p "$repo_dir/.github/workflows"
            echo "$sync_b64" | base64 -d \
              > "$repo_dir/.github/workflows/sync-copilot-instructions.yml"
            echo "$propagate_b64" | base64 -d \
              > "$repo_dir/.github/workflows/propagate-copilot-instructions.yml"
            git -C "$repo_dir" add \
              ".github/workflows/sync-copilot-instructions.yml" \
              ".github/workflows/propagate-copilot-instructions.yml"

            # Skip if nothing changed (workflows already up-to-date and no files to remove)
            if git -C "$repo_dir" diff --staged --quiet; then
              echo "  ℹ No changes to commit for $repo"
              rm -rf "$repo_dir"
              continue
            fi

            # Single commit for all changes
            git -C "$repo_dir" commit -m "Bootstrap Copilot sync workflows"

            # Force-push the branch.  This resets any previously broken branch
            # (e.g. one that only has stale per-file delete commits) to the
            # clean single-commit state above.
            if ! git -C "$repo_dir" push --force \
              "https://github.com/Cratis/${repo}.git" \
              "$branch" 2>&1; then
              echo "  ⚠ Could not push branch for $repo"
              echo "$repo" >> "$push_failures_file"
              rm -rf "$repo_dir"
              continue
            fi
            echo "  ✓ Pushed branch $branch for $repo"

            # Create PR (skip if one already exists for this branch)
            existing_pr=$(gh pr list --repo "Cratis/$repo" \
              --head "$branch" --json number --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$existing_pr" ]; then
              if gh pr create \
                --repo "Cratis/$repo" \
                --title "Bootstrap Copilot sync workflows" \
                --body "$pr_body" \
                --head "$branch" \
                --base "$default_branch" 2>/dev/null; then
                echo "  ✓ Created PR for $repo"
                echo "$repo" >> "$prs_created_file"
              else
                echo "  ⚠ Could not create PR for $repo"
              fi
            else
              echo "  ℹ PR already exists for $repo (#$existing_pr)"
              echo "$repo" >> "$prs_created_file"
            fi

            rm -rf "$repo_dir"
          done

          total_prs=$(wc -l < "$prs_created_file" 2>/dev/null || echo "0")
          total_failures=$(wc -l < "$push_failures_file" 2>/dev/null || echo "0")
          rm -f "$prs_created_file" "$push_failures_file"

          echo ""
          echo "Summary: $total_prs repo(s) with PR created or already open, $total_failures push failure(s)"

          rm -rf "$workdir"

          if [ "$total_failures" -gt 0 ]; then
            echo "::error::$total_failures repo(s) failed to have a branch pushed. Check the log above for details."
            echo "::error::If you see 'refusing to allow a Personal Access Token to create or update workflow',"
            echo "::error::the PAT_DOCUMENTATION secret needs the 'workflow' OAuth scope added."
            exit 1
          fi
