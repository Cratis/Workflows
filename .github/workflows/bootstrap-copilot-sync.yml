name: Bootstrap Copilot Sync
# Bootstrap workflow that creates PRs in all Cratis repositories to:
# 1. Delete any existing Copilot instruction files (clean slate)
# 2. Add thin wrapper workflows that delegate to the reusable workflows in this repository.
# Trigger this workflow manually to set up (or re-set up) all repositories.
#
# Requires PAT_DOCUMENTATION secret with permissions:
#   Classic PAT:       repo scope
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#
# NOTE: This workflow uses the GitHub Git Data API (blobs/trees/commits/refs)
# instead of git push to avoid the receive-hook restriction that rejects pushes
# of .github/workflows/ files unless the token has the "workflow" OAuth scope.
# The Git Data API only requires the "repo" scope (classic) or
# "Contents: write" (fine-grained), so no "workflow" scope is needed.
#
# Re-running this workflow is safe: it force-updates the branch to a clean state
# and skips repos where a PR already exists.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Verify PAT can authenticate
        env:
          GH_TOKEN: ${{ secrets.PAT_DOCUMENTATION }}
        run: |
          if ! gh api /user >/dev/null 2>&1; then
            echo "::error::Could not authenticate with PAT_DOCUMENTATION. Is the secret set correctly?"
            exit 1
          fi
          login=$(gh api /user --jq '.login')
          echo "✓ Authenticated as $login"

      - name: Get all Cratis repositories
        id: get-repos
        env:
          GH_TOKEN: ${{ secrets.PAT_DOCUMENTATION }}
        run: |
          # List all non-archived repos (limit 1000 covers foreseeable growth)
          repos=$(gh repo list Cratis --limit 1000 --json name,isArchived \
            --jq '[.[] | select(.isArchived == false) | .name]')
          echo "repos=$repos" >> $GITHUB_OUTPUT

      - name: Create PRs in all repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_DOCUMENTATION }}
        run: |
          repos='${{ steps.get-repos.outputs.repos }}'
          prs_created_file=$(mktemp)
          failures_file=$(mktemp)

          # Pre-computed base64 content for wrapper workflows.
          # Using base64 avoids heredoc end-markers at column 0,
          # which would terminate the YAML block scalar prematurely.
          #
          # sync_b64 decodes to:
          #   name: Sync Copilot Instructions
          #   on:
          #     workflow_dispatch:
          #       inputs:
          #         source_repository:
          #           description: 'Source repository (owner/repo format)'
          #           required: true
          #           type: string
          #   jobs:
          #     sync:
          #       uses: Cratis/Workflows/.github/workflows/sync-copilot-instructions.yml@main
          #       with:
          #         source_repository: ${{ inputs.source_repository }}
          #       secrets: inherit
          sync_b64=""
          #
          # propagate_b64 decodes to:
          #   name: Propagate Copilot Instructions
          #   on:
          #     push:
          #       branches: ["main"]
          #       paths:
          #         - ".github/copilot-instructions.md"
          #         - ".github/instructions/**"
          #         - ".github/agents/**"
          #         - ".github/skills/**"
          #         - ".github/prompts/**"
          #   jobs:
          #     propagate:
          #       uses: Cratis/Workflows/.github/workflows/propagate-copilot-instructions.yml@main
          #       secrets: inherit
          propagate_b64=""

          pr_body=$'Bootstraps centralized Copilot instruction management for this repository.\n\n### Changes\n\n**Removed** (if present):\n- `.github/copilot-instructions.md`\n- `.github/instructions/` folder\n- `.github/agents/` folder\n- `.github/skills/` folder\n- `.github/prompts/` folder\n\n**Added**:\n- `.github/workflows/sync-copilot-instructions.yml` \u2014 triggered via `workflow_dispatch` to pull Copilot instructions from a source repository and open a PR with the changes.\n- `.github/workflows/propagate-copilot-instructions.yml` \u2014 triggered on push to `main` when Copilot instruction files change, propagating updates to all Cratis repositories.\n\nThe actual logic lives in [Cratis/Workflows](https://github.com/Cratis/Workflows) so it can be maintained in one place. Copilot instructions will be managed centrally and synced to this repository via the workflows above.'

          branch="add-copilot-sync-workflows"

          echo "$repos" | jq -r '.[]' | while read -r repo; do
            # Skip this repository (Workflows) — it holds the reusable workflows
            if [ "$repo" = "Workflows" ]; then
              echo "Skipping Workflows (this repository)"
              continue
            fi

            echo "Processing Cratis/$repo..."

            # ----------------------------------------------------------------
            # 1. Get default branch and HEAD SHA
            # ----------------------------------------------------------------
            default_branch=$(gh api "repos/Cratis/$repo" \
              --jq '.default_branch' 2>/dev/null || true)
            if [ -z "$default_branch" ]; then
              echo "  ⚠ Could not get default branch for $repo, skipping"
              continue
            fi

            head_sha=$(gh api "repos/Cratis/$repo/git/ref/heads/$default_branch" \
              --jq '.object.sha' 2>/dev/null || true)
            if [ -z "$head_sha" ]; then
              echo "  ⚠ Could not get HEAD SHA for $repo ($default_branch branch not found), skipping"
              continue
            fi

            # ----------------------------------------------------------------
            # 2. Get the commit's tree SHA
            # ----------------------------------------------------------------
            tree_sha=$(gh api "repos/Cratis/$repo/git/commits/$head_sha" \
              --jq '.tree.sha' 2>/dev/null || true)
            if [ -z "$tree_sha" ]; then
              echo "  ⚠ Could not get tree SHA for $repo, skipping"
              continue
            fi

            # ----------------------------------------------------------------
            # 3. Get the full recursive tree to find instruction files to delete
            # ----------------------------------------------------------------
            subtree=$(gh api "repos/Cratis/$repo/git/trees/$tree_sha?recursive=1" \
              2>/dev/null || true)
            if [ -z "$subtree" ]; then
              echo "  ⚠ Could not get tree for $repo, skipping"
              continue
            fi

            # ----------------------------------------------------------------
            # 4. Create blobs for the two workflow files
            #    Using the Git Data API avoids the git receive-hook restriction
            #    that rejects workflow file pushes without the "workflow" scope.
            # ----------------------------------------------------------------
            sync_blob_sha=$(gh api -X POST "repos/Cratis/$repo/git/blobs" \
              -f content="$sync_b64" -f encoding=base64 \
              --jq '.sha' 2>/dev/null || true)
            propagate_blob_sha=$(gh api -X POST "repos/Cratis/$repo/git/blobs" \
              -f content="$propagate_b64" -f encoding=base64 \
              --jq '.sha' 2>/dev/null || true)

            if [ -z "$sync_blob_sha" ] || [ -z "$propagate_blob_sha" ]; then
              echo "  ⚠ Could not create blobs for $repo"
              echo "$repo" >> "$failures_file"
              continue
            fi

            # ----------------------------------------------------------------
            # 5. Check if workflow files already match and no files need removal
            # ----------------------------------------------------------------
            # Retrieve the current blob SHAs of the two managed workflow files
            # (empty string if the files do not yet exist in the repo).
            existing_sync=$(echo "$subtree" | jq -r \
              '.tree[] | select(.path == ".github/workflows/sync-copilot-instructions.yml") | .sha' \
              2>/dev/null || true)
            existing_propagate=$(echo "$subtree" | jq -r \
              '.tree[] | select(.path == ".github/workflows/propagate-copilot-instructions.yml") | .sha' \
              2>/dev/null || true)

            # List all blob paths under .github/ that belong to Copilot instruction
            # artefacts we want to remove: the root instructions file, plus the
            # instructions/, agents/, skills/, and prompts/ sub-directories.
            files_to_delete=$(echo "$subtree" | jq -r \
              '.tree[] | select(.type == "blob") |
               select(.path | test("^\\.github/(copilot-instructions\\.md$|instructions/|agents/|skills/|prompts/)")) |
               .path' 2>/dev/null || true)

            if [ "$existing_sync" = "$sync_blob_sha" ] && \
               [ "$existing_propagate" = "$propagate_blob_sha" ] && \
               [ -z "$files_to_delete" ]; then
              echo "  ℹ No changes needed for $repo"
              continue
            fi

            # ----------------------------------------------------------------
            # 6. Build the new tree JSON
            #    - Add the two workflow files (with their blob SHAs)
            #    - Delete instruction files by setting sha to null
            # ----------------------------------------------------------------
            new_tree_json=$(jq -n \
              --arg base_tree "$tree_sha" \
              --arg sync_path ".github/workflows/sync-copilot-instructions.yml" \
              --arg sync_sha "$sync_blob_sha" \
              --arg prop_path ".github/workflows/propagate-copilot-instructions.yml" \
              --arg prop_sha "$propagate_blob_sha" \
              '{
                base_tree: $base_tree,
                tree: [
                  {path: $sync_path, mode: "100644", type: "blob", sha: $sync_sha},
                  {path: $prop_path,  mode: "100644", type: "blob", sha: $prop_sha}
                ]
              }')

            # Append deletion entries for each instruction file found
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              new_tree_json=$(echo "$new_tree_json" | jq \
                --arg p "$file" \
                '.tree += [{path: $p, mode: "100644", type: "blob", sha: null}]')
            done <<< "$files_to_delete"

            # ----------------------------------------------------------------
            # 7. Create the new tree object
            # ----------------------------------------------------------------
            new_tree_sha=$(echo "$new_tree_json" | \
              gh api -X POST "repos/Cratis/$repo/git/trees" \
              --input - --jq '.sha' 2>/dev/null || true)

            if [ -z "$new_tree_sha" ]; then
              echo "  ⚠ Could not create tree for $repo"
              echo "$repo" >> "$failures_file"
              continue
            fi

            # ----------------------------------------------------------------
            # 8. Create the commit
            # ----------------------------------------------------------------
            new_commit_sha=$(jq -n \
              --arg msg  "Bootstrap Copilot sync workflows" \
              --arg tree "$new_tree_sha" \
              --arg parent "$head_sha" \
              '{"message": $msg, "tree": $tree, "parents": [$parent]}' | \
              gh api -X POST "repos/Cratis/$repo/git/commits" \
              --input - --jq '.sha' 2>/dev/null || true)

            if [ -z "$new_commit_sha" ]; then
              echo "  ⚠ Could not create commit for $repo"
              echo "$repo" >> "$failures_file"
              continue
            fi

            # ----------------------------------------------------------------
            # 9. Create or force-update the feature branch
            # ----------------------------------------------------------------
            existing_branch_sha=$(gh api "repos/Cratis/$repo/git/ref/heads/$branch" \
              --jq '.object.sha' 2>/dev/null || true)

            if [ -z "$existing_branch_sha" ]; then
              branch_ok=$(gh api -X POST "repos/Cratis/$repo/git/refs" \
                -f "ref=refs/heads/$branch" \
                -f "sha=$new_commit_sha" \
                --jq '.ref' 2>/dev/null || true)
            else
              branch_ok=$(gh api -X PATCH "repos/Cratis/$repo/git/refs/heads/$branch" \
                -f "sha=$new_commit_sha" \
                -F force=true \
                --jq '.ref' 2>/dev/null || true)
            fi

            if [ -z "$branch_ok" ]; then
              echo "  ⚠ Could not create/update branch for $repo"
              echo "$repo" >> "$failures_file"
              continue
            fi

            echo "  ✓ Branch $branch ready for $repo"

            # ----------------------------------------------------------------
            # 10. Create PR (skip if one already exists for this branch)
            # ----------------------------------------------------------------
            existing_pr=$(gh api "repos/Cratis/$repo/pulls?state=open&head=Cratis:$branch" \
              --jq '.[0].number' \
              2>/dev/null || true)

            if [ -z "$existing_pr" ] || [ "$existing_pr" = "null" ]; then
              if pr_url=$(gh api -X POST "repos/Cratis/$repo/pulls" \
                -f title="Bootstrap Copilot sync workflows" \
                -f body="$pr_body" \
                -f head="$branch" \
                -f base="$default_branch" \
                --jq '.html_url'); then
                echo "  ✓ Created PR for $repo: $pr_url"
                echo "$repo" >> "$prs_created_file"
              else
                echo "  ⚠ Could not create PR for $repo"
                echo "$repo" >> "$failures_file"
              fi
            else
              echo "  ℹ PR already exists for $repo (#$existing_pr)"
              echo "$repo" >> "$prs_created_file"
            fi
          done

          total_prs=$(wc -l < "$prs_created_file" 2>/dev/null || echo "0")
          total_failures=$(wc -l < "$failures_file" 2>/dev/null || echo "0")
          rm -f "$prs_created_file" "$failures_file"

          echo ""
          echo "Summary: $total_prs repo(s) with PR created or already open, $total_failures failure(s)"

          if [ "$total_failures" -gt 0 ]; then
            echo "::error::$total_failures repo(s) failed. Check the log above for details."
            exit 1
          fi
