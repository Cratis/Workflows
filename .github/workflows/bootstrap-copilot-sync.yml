name: Bootstrap Copilot Sync
# Bootstrap workflow that creates PRs in all Cratis repositories to:
# 1. Delete any existing Copilot instruction files (clean slate)
# 2. Add thin wrapper workflows that delegate to the reusable workflows in this repository.
# 3. Copy the initial Copilot setup from Cratis/AI.
# Trigger this workflow manually to set up (or re-set up) all repositories.
#
# Requires PAT_WORKFLOWS secret with permissions:
#   Classic PAT:       repo scope
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#
# NOTE: This workflow uses the GitHub Git Data API (blobs/trees/commits/refs)
# instead of git push to avoid the receive-hook restriction that rejects pushes
# of .github/workflows/ files unless the token has the "workflow" OAuth scope.
# The Git Data API only requires the "repo" scope (classic) or
# "Contents: write" (fine-grained), so no "workflow" scope is needed.
#
# Re-running this workflow is safe: it force-updates the branch to a clean state
# and skips repos where a PR already exists.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PAT can authenticate
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          auth_error=$(mktemp)
          if ! gh api /user >/dev/null 2>"$auth_error"; then
            echo "::error::Could not authenticate with PAT_WORKFLOWS. Is the secret set correctly?"
            echo "::error::API error: $(cat "$auth_error")"
            rm -f "$auth_error"
            exit 1
          fi
          rm -f "$auth_error"
          login=$(gh api /user --jq '.login')
          echo "✓ Authenticated as $login"
          # Show which credential gh is actually using — confirms PAT is active
          # and not accidentally overridden by GITHUB_TOKEN.
          echo "  gh auth status:"
          gh auth status 2>&1 | sed 's/^/    /'
          # Show PAT type and scopes to help diagnose permission issues.
          # Classic PATs expose granted scopes via the X-OAuth-Scopes response header.
          # Fine-grained PATs do not include this header.
          oauth_scopes=$(gh api /user -i 2>/dev/null | grep -i '^x-oauth-scopes:' | sed 's/[^:]*: //' | tr -d '\r' || true)
          if [ -n "$oauth_scopes" ]; then
            echo "  PAT type: classic"
            echo "  OAuth scopes: $oauth_scopes"
          else
            echo "  PAT type: fine-grained (scopes not exposed via API)"
          fi
          # NOTE: PR-creation permission is validated implicitly per-repository during
          # the main loop below.  A pre-flight probe against Cratis/Workflows would
          # always fail for fine-grained PATs that (correctly) exclude this repo.

      - name: Get all Cratis repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          # List all non-archived repos (limit 1000 covers foreseeable growth)
          # Write to a workspace file to avoid the 21000-character expression
          # length limit that applies when passing large values via step outputs.
          gh repo list Cratis --limit 1000 --json name,isArchived \
            --jq '[.[] | select(.isArchived == false) | .name]' \
            > "$GITHUB_WORKSPACE/repos.json"

      - name: Create PRs in all repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          REPOS_FILE: ${{ github.workspace }}/repos.json
        run: |
          # Confirm which credential gh is actually using — ensures PAT is active
          # and not accidentally overridden by GITHUB_TOKEN.
          echo "gh auth status (confirming PAT is used for PR creation):"
          gh auth status 2>&1 | sed 's/^/  /' || true

          bash .github/scripts/bootstrap-copilot-sync.sh
