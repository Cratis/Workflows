name: Sync Copilot Instructions
# Reusable workflow that synchronizes Copilot instructions from a source repository
# into the calling (target) repository by opening a PR with the changes.
#
# Uses the GitHub Git Data API (blobs/trees/commits) and GraphQL mutations to
# create the branch and PR — the same approach used by the Bootstrap workflow.
# No local git checkout or push of the target repository is required.
#
# This workflow requires PAT_WORKFLOWS secret with permissions:
#   Classic PAT:       repo + workflow scopes
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#                      + Workflows (read/write)

on:
  workflow_call:
    inputs:
      source_repository:
        description: 'Source repository (owner/repo format)'
        required: true
        type: string
    secrets:
      PAT_WORKFLOWS:
        required: true

permissions:
  contents: read

jobs:
  sync-instructions:
    runs-on: ubuntu-latest

    steps:
      - name: Validate source repository input
        run: |
          input="${{ inputs.source_repository }}"
          if ! echo "$input" | grep -qE '^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$'; then
            echo "::error::Invalid repository format. Expected 'owner/repo'"
            exit 1
          fi
          owner="${input%%/*}"
          if [ "$owner" != "Cratis" ]; then
            echo "::error::Source repository must belong to the Cratis organization (got '$owner')"
            exit 1
          fi

      - name: Checkout Workflows repository
        uses: actions/checkout@v4
        with:
          repository: Cratis/Workflows
          ref: main
          token: ${{ secrets.PAT_WORKFLOWS }}

      - name: Sync Copilot instructions to current repository
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          SOURCE_REPO: ${{ inputs.source_repository }}
          TARGET_REPO: ${{ github.repository }}
        run: |
          bash .github/scripts/sync-copilot-instructions.sh
