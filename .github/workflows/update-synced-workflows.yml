name: Update Synced Workflows
# Propagates the latest wrapper workflow files to all Cratis repositories.
# Run this workflow manually whenever the wrapper workflow templates in this
# repository change (e.g. new trigger added to propagate-copilot-instructions.yml).
#
# For each non-archived repository in the Cratis organization (except Workflows
# itself), the workflow:
#   1. Checks whether the installed wrapper files already match the latest version
#      and skips the repository if they do.
#   2. Skips repositories where neither wrapper file is present (not yet bootstrapped).
#   3. Creates or force-updates a branch `update-synced-workflows` with a commit
#      that updates the two wrapper workflow files.
#   4. Opens a pull request targeting the repository's default branch (or reports
#      the existing open PR if one is already open for the branch).
#
# Requires PAT_WORKFLOWS secret with permissions:
#   Classic PAT:       repo + workflow scopes
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#                      + Workflows (read/write)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PAT can authenticate
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          auth_error=$(mktemp)
          if ! gh api /user >/dev/null 2>"$auth_error"; then
            echo "::error::Could not authenticate with PAT_WORKFLOWS. Is the secret set correctly?"
            echo "::error::API error: $(cat "$auth_error")"
            rm -f "$auth_error"
            exit 1
          fi
          rm -f "$auth_error"
          login=$(gh api /user --jq '.login')
          echo "✓ Authenticated as $login"
          gh auth status 2>&1 | sed 's/^/    /'
          oauth_scopes=$(gh api /user -i 2>/dev/null | grep -i '^x-oauth-scopes:' | sed 's/[^:]*: //' | tr -d '\r' || true)
          if [ -n "$oauth_scopes" ]; then
            echo "  PAT type: classic"
            echo "  OAuth scopes: $oauth_scopes"
          else
            echo "  PAT type: fine-grained (scopes not exposed via API)"
          fi

      - name: Get all Cratis repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
        run: |
          gh repo list Cratis --limit 1000 --json name,isArchived \
            --jq '[.[] | select(.isArchived == false) | .name]' \
            > "$GITHUB_WORKSPACE/repos.json"

      - name: Update wrapper workflows in all repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOWS }}
          REPOS_FILE: ${{ github.workspace }}/repos.json
        run: |
          bash .github/scripts/update-synced-workflows.sh
